name: my-first-workflow
on:
  push:

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: running commands
        run: |
          pwd
          ls -lrth
          hostname
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: running commands
        run: |
          echo `pwd` >> myartifact.txt
          echo `ls -lrth` >> myartifact.txt
          echo `hostname` >> myartifact.txt
          cat myartifact.txt

      - name: upload single file
        uses: actions/upload-artifact@v7.0.1
        with:
          name: single_file
          path: ./myartifact.txt
